manifestVersion: 1
id: chlud-longevity
icon: https://raw.githubusercontent.com/gibe9000/umbrel-app-store/main/gallery/chlud-longevity/icon.png
name: Longevity
tagline: Self-hosted health and longevity dashboard
category: Health
version: "1.0.4"
port: 8099
description: >-
  Longevity is a private, self-hosted wellness hub for your Umbrel. Connect
  Zepp/Amazfit, Android Health Connect, smart scale data, daily check-ins, and
  biomarkers; then view trends, a composite Longevity Score, and agent-friendly
  API endpoints for tools such as Hermes.


  On first start the app prints a primary API key once in its logs — open the
  app's logs in Umbrel, copy the key, and paste it into the dashboard to sign
  in. All data stays on your Umbrel in a local SQLite database.
developer: chlud
website: https://github.com/gibe9000/longevity-platform
submitter: chlud
submission: https://github.com/gibe9000/umbrel-app-store
repo: https://github.com/gibe9000/longevity-platform
support: https://github.com/gibe9000/longevity-platform/issues
gallery: []
releaseNotes: >-
  1.0.4: tolerant ingest bodies. An empty, blank, or malformed POST body to
  the ingest endpoints is now a harmless no-op (clean 200) instead of a 422
  validation error — fixes phone sync setups (e.g. Tasker) that occasionally
  fire the HTTP request with an empty variable after a failed Health Connect
  read. Valid payloads ingest exactly as before.
dependencies: []
path: ""
defaultUsername: ""
defaultPassword: ""
