services:
  app_proxy:
    environment:
      APP_HOST: chlud-longevity_server_1
      APP_PORT: 8080
      # Let API clients (Tasker phone sync, Hermes, scales) reach the
      # key-protected API without Umbrel's login screen. The web UI stays
      # behind Umbrel auth.
      PROXY_AUTH_WHITELIST: "/api/*"

  server:
    image: ghcr.io/gibe9000/longevity-platform:1.0.2@sha256:59c874a5865854d9ef3547125247d63d11b69c5000e0f6c27ba92be989df7747
    volumes:
      - ${APP_DATA_DIR}/data:/data
    environment:
      LONGEVITY_DB: /data/longevity.db
      TZ: Europe/Copenhagen
      # Optional: pin your own key instead of the auto-generated one.
      # LONGEVITY_API_KEY: lgv_change_me_to_something_long_and_random
      # Optional: fill the dashboard with sample data on first run.
      # SEED_DEMO: "true"
    restart: on-failure
