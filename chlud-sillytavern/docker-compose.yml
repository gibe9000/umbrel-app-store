services:
  app_proxy:
    environment:
      APP_HOST: chlud-sillytavern_sillytavern_1
      APP_PORT: 8000
      # No PROXY_AUTH_WHITELIST: SillyTavern has no auth of its own once the
      # whitelist is disabled, so we deliberately keep the whole app behind
      # Umbrel's login screen.

  sillytavern:
    image: ghcr.io/sillytavern/sillytavern:1.18.0@sha256:7b30a1698b605d01dbd01a20459600c035f0d2c866912b69d7eee98065dcedd3
    environment:
      NODE_ENV: production
      # Behind Umbrel's app_proxy the container must bind 0.0.0.0 and NOT
      # reject the proxy's forwarded (non-localhost) requests.
      SILLYTAVERN_LISTEN: "true"
      SILLYTAVERN_WHITELISTMODE: "false"
    volumes:
      - ${APP_DATA_DIR}/config:/home/node/app/config
      - ${APP_DATA_DIR}/data:/home/node/app/data
      - ${APP_DATA_DIR}/plugins:/home/node/app/plugins
      - ${APP_DATA_DIR}/extensions:/home/node/app/public/scripts/extensions/third-party
      - ${APP_DATA_DIR}/backups:/home/node/app/backups
    restart: on-failure
