services:
  app_proxy:
    environment:
      APP_HOST: chlud-second-brain_server_1
      APP_PORT: 8080
      # Let AI agents (Hermes) reach the key-protected API without Umbrel's
      # login screen. The web UI stays behind Umbrel auth.
      PROXY_AUTH_WHITELIST: "/api/*"

  server:
    image: ghcr.io/gibe9000/second-brain:1.0.2@sha256:66392a2298c0bbc687225819ec43ee46e0c50628f94d074af8cd3b4852207814
    volumes:
      - ${APP_DATA_DIR}/data:/data
      # Share the vault with the official Umbrel Obsidian app: it shows up
      # inside Obsidian at /config/vaults/SecondBrain ("Open folder as vault").
      # Same cross-app pattern as albyhub/chantools mounting lightning's dir.
      - ${UMBREL_ROOT}/app-data/obsidian/data/config/vaults/SecondBrain:/vault
      # No Obsidian app on this Umbrel? Use a self-contained vault instead:
      # - ${APP_DATA_DIR}/vault:/vault
    environment:
      BRAIN_DB: /data/brain.db
      VAULT_DIR: /vault
      TZ: Europe/Copenhagen
      # Match the Obsidian app's user (linuxserver/obsidian defaults) so both
      # containers can edit the same files.
      PUID: "1000"
      PGID: "1000"
      # Optional: pin your own key instead of the auto-generated one.
      # BRAIN_API_KEY: sb_change_me_to_something_long_and_random
    restart: on-failure
